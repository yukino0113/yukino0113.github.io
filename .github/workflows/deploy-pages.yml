name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build deploy artifact
        env:
          APPS_SCRIPT_URL: ${{ vars.APPS_SCRIPT_URL }}
          VERSION: ${{ vars.VERSION }}
          EVENT_COUPLE: ${{ vars.EVENT_COUPLE }}
          EVENT_DATE: ${{ vars.EVENT_DATE }}
          EVENT_VENUE: ${{ vars.EVENT_VENUE }}
          EVENT_DEADLINE: ${{ vars.EVENT_DEADLINE }}
        run: npm run build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
