<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>禮智＆恩慈 婚禮伺服器 - 白名單申請</title>
    <meta name="description" content="婚宴賓客白名單資料表 - 基本資訊" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="sky"></div>
    <header class="site-header pixel-card compact">
      <h1>白名單申請資料表（1/2）</h1>
      <pre class="console-log">
        <span class="log-info">[12:00:00] [Main Thread/INFO]: Logging in as... ??</span>
        <span class="log-info">[12:00:00] [Main Thread/INFO]: Loading world...</span>
        <span class="log-error">[12:00:01] [Main Thread/ERROR]: Playerdata not in whitelist!</span>
        <span class="log-error">[12:00:12] [Main Thread/ERROR]: Kicked from server, reason: Unknown player</span>
      </pre>
    </header>

    <main class="rsvp-layout">
      <section class="pixel-card form-card">
        <h2>白名單基本資料</h2>

        <form id="rsvp-form" novalidate>
          <div class="form-grid">
            <label>
              /whitelist add {聯絡人姓名}
              <input name="contactName" type="text" maxlength="80" required />
            </label>

            <label>
              /playerdata modify entity @player Contact set {聯絡電話}
              <input name="contactPhone" type="tel" maxlength="20" required />
            </label>

            <label>
              /party create {成人人數}
              <input name="adultCount" type="number" min="1" max="5" value="1" required />
            </label>

            <label>
              /summon villager ~ ~ ~ {Age:-24000} {需要兒童椅的兒童人數}
              <input name="childCount" type="number" min="0" max="5" value="0" required />
            </label>
          </div>

          <div class="form-grid">
            <label>
              /give @p minecraft:cooked_carrot {需要素食餐點的人數}
              <input name="vegetarianCount" type="number" min="0" max="20" value="0" required />
            </label>
          </div>

          <label>
            特殊需求
            <textarea name="specialNeeds" rows="3" maxlength="400"></textarea>
          </label>

          <label>
            祝福留言
            <textarea name="message" rows="3" maxlength="400"></textarea>
          </label>

          <div class="actions">
            <button type="submit" class="pixel-btn submit-btn">下一步：推播資訊</button>
          </div>

          <output class="status" id="submit-status" aria-live="polite"></output>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footer-version">Version</p>
    </footer>

    <script src="/config.js"></script>
    <script type="module" src="/assets/js/rsvp.js"></script>
  </body>
</html>
